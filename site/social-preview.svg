  </g>
  <g transform="translate(756 442)">
    <rect width="356" height="88" rx="14" fill="#183329" stroke="#466657"/>
    <text x="22" y="31" fill="#8bc4ab" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="700" letter-spacing="1.5">03 · EXTENDED</text>
    <text x="22" y="61" fill="#fffdf8" font-family="Georgia, 'Times New Roman', serif" font-size="23">Four-environment research lab</text>
  </g>

  <text x="1112" y="558" text-anchor="end" fill="#b9c9c1" font-family="Arial, Helvetica, sans-serif" font-size="16">Evidence-backed project record</text>
