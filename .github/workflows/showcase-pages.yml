name: Deploy evidence-backed showcase

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/showcase-pages.yml"
      - "evidence/alfworld_20250328/**"
      - "scripts/build_historical_evidence.py"
      - "scripts/build_showcase.py"
      - "site/**"
      - "LICENSE-SHOWCASE-CODE"
      - "SHOWCASE-LICENSING.md"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: showcase-pages
  cancel-in-progress: true

jobs:
  deploy:
    name: Verify and deploy
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Verify committed evidence and site bundle
        run: python scripts/build_showcase.py --check

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site bundle
        uses: actions/upload-pages-artifact@v3
        with:
          path: site/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
